<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Focus Mode - Site Blocked</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #f5f2ee;
      background:
        radial-gradient(600px circle at 50% 40%, rgba(255, 120, 80, 0.18), transparent 60%),
        radial-gradient(500px circle at 70% 30%, rgba(140, 100, 255, 0.12), transparent 60%),
        #0f0e17;
    }

    .card {
      width: min(420px, 100%);
      padding: 48px 40px;
      text-align: center;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 20px;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      box-shadow:
        0 40px 80px rgba(0, 0, 0, 0.6),
        inset 0 1px 0 rgba(255, 255, 255, 0.05);
    }

    .icon-shell {
      width: 56px;
      height: 56px;
      margin: 0 auto 22px;
      border-radius: 999px;
      background: linear-gradient(135deg, #FF8A3D, #FF5C7A);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 10px 30px rgba(255, 120, 80, 0.5);
    }

    .icon-shell svg {
      width: 24px;
      height: 24px;
      color: #fff;
    }

    h1 {
      font-size: 28px;
      font-weight: 600;
      letter-spacing: -0.3px;
    }

    .subtitle {
      margin-top: 12px;
      font-size: 14px;
      line-height: 1.6;
      color: rgba(255, 255, 255, 0.6);
    }

    .accent-line {
      width: 60px;
      height: 2px;
      margin: 16px auto 20px;
      background: linear-gradient(90deg, #FF8A3D, transparent);
      opacity: 0.6;
    }

    .domain {
      margin-bottom: 24px;
      font-size: 13px;
      color: rgba(255, 255, 255, 0.44);
    }

    .timer-label {
      font-size: 14px;
      font-weight: 600;
      color: #f5f2ee;
    }

    .progress-shell {
      height: 6px;
      margin-top: 14px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.08);
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      width: 0%;
      border-radius: inherit;
      background: linear-gradient(90deg, #FF8A3D, #FF5C7A);
      transition: width 0.3s ease;
    }

    .button {
      width: 100%;
      margin-top: 28px;
      padding: 12px 20px;
      border: none;
      border-radius: 12px;
      background: linear-gradient(135deg, #FF8A3D 0%, #FF5C7A 100%);
      color: white;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 10px 30px rgba(255, 120, 80, 0.4);
      transition: transform 0.18s ease, box-shadow 0.18s ease;
    }

    .button:hover {
      transform: translateY(-1px);
      box-shadow: 0 14px 36px rgba(255, 120, 80, 0.46);
    }

    .button:active {
      transform: translateY(0);
    }

    .button:disabled {
      cursor: wait;
      opacity: 0.78;
      transform: none;
      box-shadow: 0 10px 30px rgba(255, 120, 80, 0.3);
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="icon-shell" aria-hidden="true">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="7"></circle>
        <circle cx="12" cy="12" r="3"></circle>
        <path d="M12 2v3M12 19v3M2 12h3M19 12h3"></path>
      </svg>
    </div>

    <h1>Stay in your flow.</h1>
    <p class="subtitle" id="blockMessage">This site is blocked while your focus session is active.</p>
    <div class="accent-line"></div>

    <p class="domain" id="blockedDomain"></p>

    <p class="timer-label" id="remainingLabel">Focus session active</p>
    <div class="progress-shell" aria-hidden="true">
      <div class="progress-fill" id="progressFill"></div>
    </div>

    <button class="button" id="returnButton" type="button">Return to session</button>
  </main>

  <script>
    const params = new URLSearchParams(window.location.search);
    const domain = params.get('domain');
    const reason = params.get('reason');

    const blockedDomainEl = document.getElementById('blockedDomain');
    const blockMessageEl = document.getElementById('blockMessage');
    const remainingLabelEl = document.getElementById('remainingLabel');
    const progressFillEl = document.getElementById('progressFill');
    const returnButton = document.getElementById('returnButton');

    if (domain) {
      blockedDomainEl.textContent = domain;
    }

    if (reason === 'YOUTUBE_RESTRICTION') {
      blockMessageEl.textContent = 'This part of YouTube is blocked while your focus session is active.';
    }

    function formatMMSS(totalSec) {
      const safe = Math.max(0, Math.floor(totalSec || 0));
      const minutes = Math.floor(safe / 60);
      const seconds = safe % 60;
      return `${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
    }

    function renderFocusState(state) {
      if (!state || state.phase !== 'FOCUS') {
        remainingLabelEl.textContent = 'Focus session active';
        progressFillEl.style.width = '100%';
        return;
      }

      let remainingSec = Number.isFinite(state.remainingSec) ? state.remainingSec : null;
      if (remainingSec != null && !state.paused && state.timestamp) {
        const elapsed = Math.max(0, Math.floor((Date.now() - state.timestamp) / 1000));
        remainingSec = Math.max(0, remainingSec - elapsed);
      }

      const phaseDurationSec = Number.isFinite(state.phaseDurationSec) ? state.phaseDurationSec : null;
      let progressPercent = Number.isFinite(state.progressPercent) ? state.progressPercent : null;

      if (phaseDurationSec && remainingSec != null) {
        progressPercent = Math.max(0, Math.min(100, ((phaseDurationSec - remainingSec) / phaseDurationSec) * 100));
      }

      if (remainingSec != null) {
        remainingLabelEl.textContent = `${formatMMSS(remainingSec)} remaining`;
      } else {
        remainingLabelEl.textContent = state.paused ? 'Session paused' : 'Focus session active';
      }

      progressFillEl.style.width = `${progressPercent != null ? progressPercent : 100}%`;
    }

    function fetchFocusState() {
      chrome.runtime.sendMessage({ type: 'GET_FOCUS_STATE' }, (response) => {
        if (chrome.runtime.lastError) {
          console.error('Failed to fetch focus state:', chrome.runtime.lastError);
          return;
        }
        renderFocusState(response);
      });
    }

    async function getFallbackSessionUrl() {
      const stored = await chrome.storage.local.get([
        'activeSessionUrl',
        'activeSessionId',
        'frontendUrl'
      ]);

      return (
        stored.activeSessionUrl ||
        (stored.activeSessionId
          ? `${(stored.frontendUrl || 'http://localhost:5173').replace(/\/+$/, '')}?session=${stored.activeSessionId}`
          : (stored.frontendUrl || 'http://localhost:5173'))
      );
    }

    async function returnToSessionDirect() {
      try {
        const fallbackUrl = await getFallbackSessionUrl();
        if (!fallbackUrl) {
          throw new Error('No active focus session found.');
        }

        window.location.assign(fallbackUrl);
      } catch (error) {
        console.error('Direct return to session failed:', error);
        alert(`Unable to return to session: ${error.message}`);
      }
    }

    returnButton.addEventListener('click', async () => {
      returnButton.disabled = true;
      const previousLabel = returnButton.textContent;
      returnButton.textContent = 'Returning...';

      chrome.runtime.sendMessage({ type: 'RETURN_TO_SESSION' }, (response) => {
        if (chrome.runtime.lastError) {
          console.error('Failed to return to session:', chrome.runtime.lastError);
          returnToSessionDirect();
          return;
        }

        if (!response || !response.success || response.mode !== 'focus-tab') {
          console.error('Return to session failed:', response?.error);
          returnToSessionDirect();
          return;
        }

        returnButton.disabled = false;
        returnButton.textContent = previousLabel;
      });
    });

    fetchFocusState();
    setInterval(fetchFocusState, 1000);
  </script>
</body>
</html>
